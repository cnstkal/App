<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCID: 아이돌 로망스</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25%); } }
        
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
        .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
        .animate-bounce-subtle { animation: bounce-subtle 1.5s infinite; }
        
        /* Custom Text Gradient */
        .bg-clip-text {
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* Prevent text selection during fast clicking */
        .select-none {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden font-sans selection:bg-pink-500 selection:text-white">

    <div id="app-container" class="min-h-screen bg-zinc-900 text-white flex flex-col transition-colors duration-700 ease-in-out select-none">
        
        <!-- Top Status Bar -->
        <div class="w-full p-4 flex justify-between items-center bg-black/40 backdrop-blur-sm fixed top-0 z-20">
            <div class="flex space-x-4 items-center">
                <span class="font-bold text-lg tracking-widest text-pink-300">LUCID</span>
                <span id="chapter-indicator" class="px-3 py-1 bg-white/10 rounded-full text-sm">챕터 1 / 5</span>
            </div>
            
            <!-- Affection Trackers -->
            <div id="affection-trackers" class="hidden md:flex space-x-3">
                <!-- Dynamically Injected -->
            </div>
        </div>

        <!-- Main Visual Area -->
        <div class="flex-1 relative flex items-center justify-center overflow-hidden pt-16 pb-48">
            <!-- Character Art / Glow goes here -->
            <div id="visual-area" class="absolute inset-0 flex items-center justify-center"></div>

            <!-- Choices Overlay -->
            <div id="choices-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 z-30 space-y-4 p-4 hidden">
                <!-- Dynamically Injected Choices -->
            </div>
        </div>

        <!-- Dialogue Box -->
        <div class="fixed bottom-0 w-full p-4 md:p-8 z-40">
            <div id="dialogue-box-container" class="max-w-4xl mx-auto bg-black/80 backdrop-blur-lg border-t-2 border-x-2 border-white/10 rounded-t-2xl p-6 md:p-8 min-h-[160px] md:min-h-[200px] shadow-2xl relative transition-colors cursor-pointer hover:bg-black/90">
                
                <!-- Speaker Name -->
                <div id="speaker-box" class="absolute -top-5 left-8">
                    <!-- Dynamically Injected -->
                </div>

                <!-- Text Content -->
                <div class="mt-4">
                    <p id="dialogue-text" class="text-lg md:text-xl leading-relaxed text-zinc-100 whitespace-pre-wrap"></p>
                </div>

                <!-- Next Indicator -->
                <div id="next-indicator" class="absolute bottom-6 right-8 animate-bounce-subtle hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Ending Screen (Hidden initially) -->
    <div id="ending-screen" class="min-h-screen bg-black text-white flex-col items-center justify-center p-8 hidden w-full fixed inset-0 z-50 overflow-y-auto flex">
        <div id="ending-content" class="max-w-2xl w-full text-center space-y-8 animate-fade-in-up mt-auto mb-auto">
            <!-- Dynamically Injected Ending Content -->
        </div>
    </div>

    <script>
        // Game Constants & Data
        const CHARACTERS = {
            MC: { name: '이시우', role: '주인공 / 센터', color: 'bg-gray-700', text: 'text-gray-100' },
            DOJIN: { name: '강도진', role: '리더 / 메인래퍼', color: 'bg-blue-900', text: 'text-blue-200', desc: '과묵하지만 책임감 강한 리더.' },
            EUNHO: { name: '서은호', role: '메인댄서', color: 'bg-orange-600', text: 'text-orange-200', desc: '팀의 분위기 메이커.' },
            YEONWOO: { name: '백연우', role: '메인보컬', color: 'bg-slate-300', text: 'text-slate-800', desc: '까칠한 완벽주의자.' },
            JAEHYUN: { name: '차재현', role: '막내 / 비주얼', color: 'bg-purple-800', text: 'text-purple-200', desc: '속을 알 수 없는 막내.' },
            SYSTEM: { name: 'SYSTEM', role: '', color: 'bg-zinc-900', text: 'text-zinc-400' }
        };

        const STORY_NODES = {
            /* ================= 챕터 1: 바닥에서의 시작 ================= */
            start: { bg: 'bg-zinc-900', chapter: 1, speaker: 'MC', text: '"통장 잔고 3만 원... 이번 달 식비는 이걸로 끝인가."\n데뷔 3년 차 아이돌 그룹 [LUCID]. 우리는 이른바 망한 아이돌, \'망돌\'이다.', next: 'ch1_1' },
            ch1_1: { bg: 'bg-zinc-800', chapter: 1, speaker: 'SYSTEM', text: '끝없는 스케줄 공백과 악플, 그리고 빚. 소속사는 이미 우리를 반쯤 포기한 상태다.', next: 'ch1_2' },
            ch1_2: { bg: 'bg-zinc-800', chapter: 1, speaker: 'MC', text: '비가 쏟아지는 텅 빈 연습실 앞. 스트레스가 극에 달해 다리에 힘이 풀려 주저앉았다.\n"진짜 다 그만두고 싶다... 누가 나 좀 붙잡아 줬으면..."', choices: [
                { text: '말없이 우산을 씌워주는 도진 형에게 기댄다.', next: 'ch1_dojin_1', effect: { char: 'DOJIN', val: 20 } },
                { text: '내 손을 이끌고 무작정 달리는 은호를 따라간다.', next: 'ch1_eunho_1', effect: { char: 'EUNHO', val: 20 } }
            ]},
            
            // 챕터 1: 도진 분기
            ch1_dojin_1: { bg: 'bg-blue-950', char: 'DOJIN', chapter: 1, speaker: 'DOJIN', text: '"...힘들면 억지로 안 웃어도 돼. 비 맞으면 감기 걸린다, 시우야."', next: 'ch1_dojin_2' },
            ch1_dojin_2: { bg: 'bg-blue-900', char: 'DOJIN', chapter: 1, speaker: 'MC', text: '도진 형의 넓은 어깨에 기대어 한참을 울었다. 형은 아무 말 없이 자기 어깨가 다 젖도록 내게 우산을 기울여 주었다.', next: 'ch1_end' },
            
            // 챕터 1: 은호 분기
            ch1_eunho_1: { bg: 'bg-orange-950', char: 'EUNHO', chapter: 1, speaker: 'EUNHO', text: '"시우 형! 비 오는데 청춘 드라마 한 편 찍을까요? 뛰어요, 뛸 때까지!"', next: 'ch1_eunho_2' },
            ch1_eunho_2: { bg: 'bg-orange-900', char: 'EUNHO', chapter: 1, speaker: 'MC', text: '빗속을 숨이 턱 끝까지 차오르도록 뛰고 나니 오히려 가슴이 뻥 뚫렸다. 은호의 환한 웃음에 나도 모르게 마주 보며 웃어버렸다.', next: 'ch1_end' },
            
            ch1_end: { bg: 'bg-zinc-900', chapter: 1, speaker: 'SYSTEM', text: '멤버의 위로에 작은 힘을 얻은 다음 날. 길거리 버스킹 직캠 하나가 기적처럼 알고리즘을 타기 시작했다!', next: 'ch2_start' },
            
            /* ================= 챕터 2: 밀려오는 파도 ================= */
            ch2_start: { bg: 'bg-neutral-900', chapter: 2, speaker: 'MC', text: '직캠이 터지면서 처음으로 음원 차트 100위권에 진입했다. 방송국 출근길에도 우리를 찍는 대포 카메라가 생겼다.', next: 'ch2_1' },
            ch2_1: { bg: 'bg-neutral-800', chapter: 2, speaker: 'SYSTEM', text: '하지만 기쁨도 잠시, 스케줄은 엉망이 되고 질투 어린 악성 루머들의 표적이 되었다. 대기실 구석, 말도 안 되는 스폰서 루머에 숨죽여 울고 있을 때...', choices: [
                { text: '까칠하지만 다정한 연우가 다가온다.', next: 'ch2_yeonwoo_1', effect: { char: 'YEONWOO', val: 25 } },
                { text: '막내 재현이가 서늘한 눈빛으로 다가온다.', next: 'ch2_jaehyun_1', effect: { char: 'JAEHYUN', val: 25 } }
            ]},
            
            // 챕터 2: 연우 분기
            ch2_yeonwoo_1: { bg: 'bg-slate-900', char: 'YEONWOO', chapter: 2, speaker: 'YEONWOO', text: '"바보같이 왜 울고 있어. 네 실력 내가 아는데. 그런 쓰레기 같은 글 보지 말고 내 노래나 들어."\n(연우가 자신의 이어폰 한쪽을 내 귀에 꽂아준다)', next: 'ch2_yeonwoo_2' },
            ch2_yeonwoo_2: { bg: 'bg-slate-800', char: 'YEONWOO', chapter: 2, speaker: 'MC', text: '연우가 직접 작곡한 미공개 데모곡이었다. 거칠어 보이지만 따뜻한 멜로디에 위로받으며 마음이 차분해졌다.', next: 'ch2_end' },
            
            // 챕터 2: 재현 분기
            ch2_jaehyun_1: { bg: 'bg-purple-950', char: 'JAEHYUN', chapter: 2, speaker: 'JAEHYUN', text: '"형을 괴롭히는 것들은 다 치워버리고 싶어요... 형은 그냥, 제 옆에서 빛나기만 하면 되는데."', next: 'ch2_jaehyun_2' },
            ch2_jaehyun_2: { bg: 'bg-purple-900', char: 'JAEHYUN', chapter: 2, speaker: 'MC', text: '재현이의 눈빛은 무서울 정도로 차가웠지만, 내 눈물을 조심스레 닦아주는 손길은 한없이 다정하고 집요했다.', next: 'ch2_end' },
            
            ch2_end: { bg: 'bg-zinc-900', chapter: 2, speaker: 'SYSTEM', text: '며칠 뒤, 악성 루머를 퍼뜨리던 계정들이 일제히 소속사로부터 고소장을 받았다는 소식이 들려왔다. 우리는 다시 마음을 다잡았다.', next: 'ch3_start' },
            
            /* ================= 챕터 3: 서바이벌과 견제 ================= */
            ch3_start: { bg: 'bg-stone-900', chapter: 3, speaker: 'SYSTEM', text: '물 들어올 때 노 저어야 한다. 화제성을 이어가기 위해 패자부활전 서바이벌 프로그램 [Re:Boot]에 출연하게 되었다.', next: 'ch3_1' },
            ch3_1: { bg: 'bg-stone-800', chapter: 3, speaker: 'MC', text: '경연 당일, 타 그룹의 견제가 심하다. 리허설 중 누군가 고의로 무대에 물을 쏟았고, 나는 크게 미끄러져 넘어질 뻔했다.', choices: [
                { text: '재빠르게 허리를 낚아채는 도진', next: 'ch3_dojin_1', effect: { char: 'DOJIN', val: 30 } },
                { text: '같이 넘어지며 쿠션이 되어준 은호', next: 'ch3_eunho_1', effect: { char: 'EUNHO', val: 30 } },
                { text: '화를 내며 내 앞을 막아서는 연우', next: 'ch3_yeonwoo_1', effect: { char: 'YEONWOO', val: 30 } },
                { text: '범인을 찾아 무섭게 노려보는 재현', next: 'ch3_jaehyun_1', effect: { char: 'JAEHYUN', val: 30 } }
            ]},
            
            // 챕터 3: 세부 분기
            ch3_dojin_1: { bg: 'bg-blue-950', char: 'DOJIN', chapter: 3, speaker: 'DOJIN', text: '"조심해. 넌 우리 팀의 심장이야. 다치면 안 돼."', next: 'ch3_dojin_2' },
            ch3_dojin_2: { bg: 'bg-blue-900', char: 'DOJIN', chapter: 3, speaker: 'MC', text: '도진 형은 단단한 팔로 나를 지탱했다. 리허설 내내 내 동선을 체크하며 위험 요소를 모두 치워주는 든든함에 심장이 뛰었다.', next: 'ch3_end' },
            
            ch3_eunho_1: { bg: 'bg-orange-950', char: 'EUNHO', chapter: 3, speaker: 'EUNHO', text: '"아얏... 형 안 다쳤죠? 나 형 지켰다! 얼른 칭찬해 줘요!"', next: 'ch3_eunho_2' },
            ch3_eunho_2: { bg: 'bg-orange-900', char: 'EUNHO', chapter: 3, speaker: 'MC', text: '자신의 팔에 큰 멍이 들었는데도 내게 안긴 채 헤실헤실 웃는 은호. 나는 미안함과 고마움에 그의 머리를 조심스레 쓰다듬었다.', next: 'ch3_end' },
            
            ch3_yeonwoo_1: { bg: 'bg-slate-900', char: 'YEONWOO', chapter: 3, speaker: 'YEONWOO', text: '"어떤 새끼야! 우리 애 다칠 뻔했잖아!! 조심 좀 하라고!"', next: 'ch3_yeonwoo_2' },
            ch3_yeonwoo_2: { bg: 'bg-slate-800', char: 'YEONWOO', chapter: 3, speaker: 'MC', text: '평소엔 무심한 척하던 연우가 불같이 화를 내며 내 손을 꽉 쥐었다. 나를 자신의 뒤로 숨기는 그의 넓은 등이 낯설게 다가왔다.', next: 'ch3_end' },
            
            ch3_jaehyun_1: { bg: 'bg-purple-950', char: 'JAEHYUN', chapter: 3, speaker: 'JAEHYUN', text: '"...형 털끝 하나라도 건드리면, 가만 안 둬요 진짜."', next: 'ch3_jaehyun_2' },
            ch3_jaehyun_2: { bg: 'bg-purple-900', char: 'JAEHYUN', chapter: 3, speaker: 'MC', text: '무대 뒤편으로 스윽 사라졌던 재현이가 돌아왔을 때, 물을 쏟았던 타 그룹 멤버는 사색이 되어 벌벌 떨며 내게 사과하러 왔다.', next: 'ch3_end' },
            
            ch3_end: { bg: 'bg-zinc-900', chapter: 3, speaker: 'SYSTEM', text: '완벽한 팀워크로 무대를 마친 우리는 심사위원들의 극찬을 받으며 압도적인 1위로 서바이벌 경연을 마쳤다.', next: 'ch4_start' },
            
            /* ================= 챕터 4: 첫 1위, 그리고 밤 ================= */
            ch4_start: { bg: 'bg-indigo-950', chapter: 4, speaker: 'SYSTEM', text: '서바이벌의 최종 우승 버프로 발매한 새 앨범. 마침내 데뷔 5년 만에 지상파 음악방송 1위 후보에 올랐다.', next: 'ch4_1' },
            ch4_1: { bg: 'bg-indigo-900', chapter: 4, speaker: 'MC', text: '"1위는...... LUCID! 축하합니다!!!"\n(쏟아지는 꽃가루 속에서, 우리는 생방송 중임을 잊은 채 부둥켜안고 오열했다.)', next: 'ch4_2' },
            ch4_2: { bg: 'bg-zinc-800', chapter: 4, speaker: 'MC', text: '숙소로 돌아온 밤. 모두가 잠든 시간, 바람을 쐬러 나온 테라스에서 발소리가 들린다. 오늘 밤, 누구와 이 기쁨을 나눌까?', choices: [
                { text: '도진의 발소리', next: 'ch4_dojin_1', effect: { char: 'DOJIN', val: 40 } },
                { text: '은호의 발소리', next: 'ch4_eunho_1', effect: { char: 'EUNHO', val: 40 } },
                { text: '연우의 발소리', next: 'ch4_yeonwoo_1', effect: { char: 'YEONWOO', val: 40 } },
                { text: '재현의 발소리', next: 'ch4_jaehyun_1', effect: { char: 'JAEHYUN', val: 40 } }
            ]},
            
            // 챕터 4: 세부 분기
            ch4_dojin_1: { bg: 'bg-blue-950', char: 'DOJIN', chapter: 4, speaker: 'DOJIN', text: '"포기하지 않아 줘서 고마워. 앞으로도 내 옆은 영원히 네 자리다."', next: 'ch4_dojin_2' },
            ch4_dojin_2: { bg: 'bg-blue-900', char: 'DOJIN', chapter: 4, speaker: 'MC', text: '도진 형은 나를 부드럽게, 하지만 강하게 끌어안았다. 셔츠 너머로 느껴지는 그의 뜨거운 체온과 심장 소리가 내 귓가에 선명하게 울렸다.', next: 'ch5_start' },
            
            ch4_eunho_1: { bg: 'bg-orange-950', char: 'EUNHO', chapter: 4, speaker: 'EUNHO', text: '"형 덕분이에요. 나 진짜 형 없었으면 어떡할 뻔했지? 사랑해요, 진짜로."', next: 'ch4_eunho_2' },
            ch4_eunho_2: { bg: 'bg-orange-900', char: 'EUNHO', chapter: 4, speaker: 'MC', text: '나를 꽉 끌어안고 목덜미에 얼굴을 묻은 은호. 평소의 장난기는 사라지고, 그의 목소리에는 짙은 애정이 묻어나고 있었다.', next: 'ch5_start' },
            
            ch4_yeonwoo_1: { bg: 'bg-slate-900', char: 'YEONWOO', chapter: 4, speaker: 'YEONWOO', text: '"...오늘 좀 예쁘더라. 무대에서. 앞으로도 다른 데 보지 말고 내 옆에서 노래해 줘."', next: 'ch4_yeonwoo_2' },
            ch4_yeonwoo_2: { bg: 'bg-slate-800', char: 'YEONWOO', chapter: 4, speaker: 'MC', text: '얼굴을 붉히며 시선을 피하는 연우. 하지만 내 허리를 감싸 안는 그의 손길은 그 어느 때보다 단호하고 다정했다.', next: 'ch5_start' },
            
            ch4_jaehyun_1: { bg: 'bg-purple-950', char: 'JAEHYUN', chapter: 4, speaker: 'JAEHYUN', text: '"이제 시작이에요. 형이 가장 높은 곳에서 빛나게 해줄게요. 그리고 형은... 나만 보면 돼요."', next: 'ch4_jaehyun_2' },
            ch4_jaehyun_2: { bg: 'bg-purple-900', char: 'JAEHYUN', chapter: 4, speaker: 'MC', text: '재현이는 내 손등에 가볍게 입을 맞추더니, 이내 시선을 올려 내 눈을 깊게 얽매어왔다. 직진하는 그의 마음에 숨이 멎을 것 같았다.', next: 'ch5_start' },

            /* ================= 챕터 5: 고척 스카이돔 ================= */
            ch5_start: { bg: 'bg-black', chapter: 5, speaker: 'SYSTEM', text: '그리고 1년 뒤... 대한민국 아이돌의 꿈, [고척 스카이돔]. 2만 명의 팬들이 우리의 이름을 연호하고 있다.', next: 'ch5_1' },
            ch5_1: { bg: 'bg-zinc-900', chapter: 5, speaker: 'MC', text: '리프트 탑승 1분 전. 심장이 터질 것 같다. 지나온 모든 고난이 주마등처럼 스쳐 지나간다.', next: 'ch5_2' },
            ch5_2: { bg: 'bg-zinc-800', chapter: 5, speaker: 'MC', text: '스태프의 큐사인이 떨어지기 직전, 나는 숨을 크게 들이마시며 곁에 있는 멤버들을 돌아보았다.', next: 'ending_branch' },
            ending_branch: { bg: 'bg-zinc-900', chapter: 5, speaker: 'MC', text: '마침내 막이 오르기 전, 나의 진짜 목표는 무엇일까?', choices: [
                { text: '대한민국 최정상 아이돌로 커리어의 정점을 찍는 것', next: 'ending_career', effect: { type: 'career' } },
                { text: '나를 지탱해준 단 한 사람과 영원히 함께하는 것', next: 'ending_love', effect: { type: 'love' } }
            ]}
        };

        // Game State
        let state = {
            currentNode: 'start',
            affection: { DOJIN: 0, EUNHO: 0, YEONWOO: 0, JAEHYUN: 0 },
            isTyping: false,
            endingType: null,
            typingInterval: null
        };

        // SVG Icons used in UI
        const ICONS = {
            users: `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/70"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            chevron: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-hover:opacity-100 transition-opacity"><path d="m9 18 6-6-6-6"/></svg>`,
            trophy: `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-yellow-400 mb-6"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
            heart: (colorClass) => `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-6 ${colorClass}"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`
        };

        function init() {
            render();
            
            // Attach event listener to dialogue box
            document.getElementById('dialogue-box-container').addEventListener('click', handleNext);
        }

        function render() {
            if (state.endingType) {
                renderEnding();
                return;
            }

            const node = STORY_NODES[state.currentNode];
            
            // 1. Update Background
            const container = document.getElementById('app-container');
            container.className = `min-h-screen ${node.bg} text-white flex flex-col transition-colors duration-700 ease-in-out select-none`;

            // 2. Update Top Bar
            document.getElementById('chapter-indicator').innerText = `챕터 ${node.chapter} / 5`;
            const affectionContainer = document.getElementById('affection-trackers');
            affectionContainer.innerHTML = Object.entries(state.affection).map(([charKey, val]) => `
                 <div class="flex items-center text-xs space-x-1 opacity-70">
                    <div class="w-2 h-2 rounded-full ${CHARACTERS[charKey].color}"></div>
                    <span>${CHARACTERS[charKey].name}: ${val}</span>
                 </div>
            `).join('');

            // 3. Update Visual Area (Character Info)
            const visualArea = document.getElementById('visual-area');
            if (node.char && CHARACTERS[node.char]) {
                const char = CHARACTERS[node.char];
                visualArea.innerHTML = `
                <div class="absolute inset-0 flex items-center justify-center animate-fade-in">
                    <div class="absolute w-64 h-96 blur-3xl opacity-30 rounded-full ${char.color}"></div>
                    <div class="relative z-10 flex flex-col items-center bg-black/60 p-8 rounded-3xl border border-white/10 backdrop-blur-md transform transition-transform hover:scale-105">
                        <div class="w-24 h-24 rounded-full flex items-center justify-center mb-4 ${char.color}">
                            ${ICONS.users}
                        </div>
                        <h2 class="text-3xl font-bold mb-2 ${char.text}">${char.name}</h2>
                        <p class="text-zinc-400 text-sm tracking-wider">${char.role}</p>
                    </div>
                </div>
                `;
            } else {
                visualArea.innerHTML = '';
            }

            // 4. Update Speaker Name
            const speakerBox = document.getElementById('speaker-box');
            if (node.speaker) {
                const speaker = CHARACTERS[node.speaker] || { name: node.speaker, color: 'bg-zinc-800' };
                speakerBox.innerHTML = `
                    <span class="px-6 py-2 rounded-full font-bold text-sm md:text-base shadow-lg ${speaker.color}">
                        ${speaker.name}
                    </span>
                `;
            } else {
                speakerBox.innerHTML = '';
            }

            // 5. Reset & Handle Choices Overlay / Next UI
            const choicesOverlay = document.getElementById('choices-overlay');
            choicesOverlay.innerHTML = '';
            choicesOverlay.classList.add('hidden');
            document.getElementById('next-indicator').classList.add('hidden');

            const dialogueBox = document.getElementById('dialogue-box-container');
            dialogueBox.classList.add('cursor-pointer', 'hover:bg-black/90');

            // 6. Typewriter Effect
            typeText(node.text, () => {
                // On Typing Complete
                if (node.choices) {
                    choicesOverlay.classList.remove('hidden');
                    choicesOverlay.innerHTML = node.choices.map((choice, idx) => `
                        <button
                            onclick="handleChoice(${idx})"
                            class="w-full max-w-md p-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-all duration-300 backdrop-blur-md text-left hover:pl-6 group flex items-center justify-between"
                        >
                            <span>${choice.text}</span>
                            ${ICONS.chevron}
                        </button>
                    `).join('');
                    
                    // Disable clicking the box to advance if choices exist
                    dialogueBox.classList.remove('cursor-pointer', 'hover:bg-black/90');
                } else {
                    document.getElementById('next-indicator').classList.remove('hidden');
                }
            });
        }

        function typeText(text, onComplete) {
            state.isTyping = true;
            let i = 0;
            const textElement = document.getElementById('dialogue-text');
            textElement.innerHTML = '';
            
            if (state.typingInterval) clearInterval(state.typingInterval);
            
            state.typingInterval = setInterval(() => {
                if (i < text.length) {
                    textElement.innerHTML += text.charAt(i) === '\n' ? '<br/>' : text.charAt(i);
                    i++;
                } else {
                    clearInterval(state.typingInterval);
                    state.isTyping = false;
                    if (onComplete) onComplete();
                }
            }, 30);
        }

        function handleNext() {
            const node = STORY_NODES[state.currentNode];
            const dialogueBox = document.getElementById('dialogue-box-container');
            
            // If choices are present and we are done typing, clicking the box does nothing
            if (node.choices && !state.isTyping) return; 

            if (state.isTyping) {
                // Skip typing
                clearInterval(state.typingInterval);
                document.getElementById('dialogue-text').innerHTML = node.text.replace(/\n/g, '<br/>');
                state.isTyping = false;
                
                if (node.choices) {
                    const choicesOverlay = document.getElementById('choices-overlay');
                    choicesOverlay.classList.remove('hidden');
                    choicesOverlay.innerHTML = node.choices.map((choice, idx) => `
                        <button
                            onclick="handleChoice(${idx})"
                            class="w-full max-w-md p-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-all duration-300 backdrop-blur-md text-left hover:pl-6 group flex items-center justify-between"
                        >
                            <span>${choice.text}</span>
                            ${ICONS.chevron}
                        </button>
                    `).join('');
                    
                    dialogueBox.classList.remove('cursor-pointer', 'hover:bg-black/90');
                } else {
                    document.getElementById('next-indicator').classList.remove('hidden');
                }
            } else if (node.next) {
                state.currentNode = node.next;
                render();
            }
        }

        window.handleChoice = function(choiceIdx) {
            // Prevent event bubbling if necessary
            if(window.event) window.event.stopPropagation();

            const node = STORY_NODES[state.currentNode];
            const choice = node.choices[choiceIdx];
            
            if (choice.effect) {
                if (choice.effect.char) {
                    state.affection[choice.effect.char] += choice.effect.val;
                }
                if (choice.effect.type) {
                    state.endingType = choice.effect.type;
                    render();
                    return;
                }
            }
            
            state.currentNode = choice.next;
            render();
        }

        function getTopMember() {
            let top = 'DOJIN';
            let max = -1;
            for (const [char, val] of Object.entries(state.affection)) {
                if (val > max) {
                    max = val;
                    top = char;
                }
            }
            return CHARACTERS[top];
        }

        function renderEnding() {
            document.getElementById('app-container').style.display = 'none';
            const endingScreen = document.getElementById('ending-screen');
            endingScreen.classList.remove('hidden');
            
            const contentContainer = document.getElementById('ending-content');
            const topMember = getTopMember();
            
            if (state.endingType === 'career') {
                contentContainer.innerHTML = `
                    <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-pink-500">
                        최정상의 아이돌 (Career Ending)
                    </h1>
                    <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-700 shadow-2xl text-left md:text-center">
                        ${ICONS.trophy}
                        <p class="text-xl leading-relaxed text-zinc-300">
                            고척 스카이돔의 무대, 수만 개의 응원봉이 은하수처럼 빛난다.<br/><br/>
                            수많은 역경과 고난을 이겨내고, 마침내 우리는 대한민국 최고의 그룹 [LUCID]로 역사에 남았다.
                            나의 땀방울, 우리의 노력은 결국 증명되었다. 나는 무대 중앙에서 가장 환하게 웃었다.
                        </p>
                        <p class="text-2xl font-semibold text-yellow-300 pt-8">"우리는 영원히 레전드로 남을 겁니다!"</p>
                    </div>
                    <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-full transition-all duration-300 font-semibold text-white">
                        처음부터 다시 하기
                    </button>
                `;
            } else {
                contentContainer.innerHTML = `
                    <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-pink-500">
                        단 하나의 별 (Love Ending)
                    </h1>
                    <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-700 shadow-2xl text-left md:text-center">
                        ${ICONS.heart(topMember.text)}
                        <p class="text-xl leading-relaxed text-zinc-300">
                            무대의 막이 오르기 직전, 긴장한 내 손을 꽉 잡아준 것은 바로 <span class="font-bold ${topMember.text}">${topMember.name}</span>이었다.<br/><br/>
                            성공도, 명예도 좋지만, 내가 포기하지 않고 여기까지 올 수 있었던 단 하나의 이유는 바로 그가 곁에 있었기 때문이다. 
                            환호성 속에서 우리는 서로를 바라보며 조용히 미소 지었다. 
                        </p>
                        <p class="text-2xl font-semibold pt-8 ${topMember.text}">"${topMember.name}... 네가 내 기적이야."</p>
                    </div>
                    <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-full transition-all duration-300 font-semibold text-white">
                        처음부터 다시 하기
                    </button>
                `;
            }
        }

        // Start the game on load
        window.onload = init;
    </script>
</body>
</html>
