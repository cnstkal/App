<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>망돌로 살아남기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Pretendard',sans-serif;
background:radial-gradient(circle at top,#3f2070 0%,#13081f 50%,#06040c 100%);
color:#fff;
overflow:hidden;
height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background-image:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.15) 1px,transparent 1px),
radial-gradient(circle at 80% 30%,rgba(255,255,255,.2) 1px,transparent 1px),
radial-gradient(circle at 40% 70%,rgba(255,255,255,.12) 2px,transparent 2px);
background-size:160px 160px;
pointer-events:none;
opacity:.45;
}

#game{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.phone{
width:390px;
height:844px;
background:linear-gradient(180deg,#211240,#0d0917);
border-radius:38px;
overflow:hidden;
position:relative;
border:2px solid rgba(255,255,255,.08);
box-shadow:0 30px 80px rgba(0,0,0,.55);
}

.screen{
padding:24px;
height:100%;
display:flex;
flex-direction:column;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.day{
font-family:'Press Start 2P',cursive;
font-size:13px;
color:#f6c8ff;
line-height:1.6;
}

.stat-box{
display:flex;
gap:12px;
font-size:14px;
}

.stat-chip{
padding:8px 12px;
border-radius:999px;
background:rgba(255,255,255,.08);
}

.stage{
height:280px;
border-radius:28px;
background:
linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1501386761578-eac5c94b800a?q=80&w=1200&auto=format&fit=crop') center/cover;
position:relative;
overflow:hidden;
display:flex;
align-items:flex-end;
justify-content:center;
margin-bottom:18px;
}

.spotlight{
position:absolute;
width:180px;
height:180px;
border-radius:50%;
background:radial-gradient(circle,rgba(194,121,255,.9),transparent 70%);
bottom:10px;
filter:blur(8px);
}

.character{
position:relative;
z-index:2;
width:170px;
height:220px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
animation:float 3s ease-in-out infinite;
}

.head{
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(180deg,#43306d,#1c1233);
position:relative;
box-shadow:0 0 25px rgba(178,112,255,.6);
}

.hair{
position:absolute;
width:110px;
height:70px;
background:#1b1030;
border-radius:55px 55px 35px 35px;
top:-10px;
left:-5px;
}

.eye{
position:absolute;
width:10px;
height:10px;
background:#fff;
border-radius:50%;
top:45px;
box-shadow:0 0 10px #d39cff;
}

.eye.left{left:28px}
.eye.right{right:28px}

.mouth{
position:absolute;
width:24px;
height:10px;
border-bottom:3px solid #ffb2ea;
border-radius:0 0 20px 20px;
left:50%;
transform:translateX(-50%);
bottom:24px;
}

.body-char{
width:90px;
height:110px;
background:linear-gradient(180deg,#30214d,#161022);
border-radius:22px;
margin-top:-8px;
border:2px solid rgba(255,255,255,.08);
}

.dialogue-box{
background:#fff;
color:#23143f;
padding:20px;
border-radius:22px;
line-height:1.6;
font-weight:700;
margin-bottom:16px;
min-height:110px;
}

#speaker{
font-size:13px;
margin-bottom:10px;
color:#b26eff;
font-weight:800;
}

.choices{
display:flex;
flex-direction:column;
gap:12px;
}

.choice{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:16px;
border-radius:18px;
color:#f1e8ff;
font-size:15px;
cursor:pointer;
transition:.25s ease;
}

.choice:hover{
transform:translateY(-3px);
background:rgba(205,131,255,.16);
border-color:#d693ff;
}

.panel{
margin-top:18px;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
}

.panel-title{
font-weight:700;
margin-bottom:14px;
color:#f1b8ff;
}

.member{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}

.member:last-child{border-bottom:none}

.bar{
width:120px;
height:10px;
border-radius:999px;
background:rgba(255,255,255,.08);
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#ff8ce8,#9f68ff);
}

.result{
position:absolute;
inset:0;
background:rgba(5,4,12,.94);
display:none;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
z-index:99;
}

.result.show{display:flex}

.result-card{
background:linear-gradient(180deg,#2a1650,#130b24);
padding:34px;
border-radius:28px;
width:100%;
}

.result-card h1{
font-family:'Press Start 2P',cursive;
font-size:22px;
line-height:1.6;
color:#ffc8ff;
margin-bottom:26px;
}

.result-card p{
line-height:1.8;
color:#e6dcff;
margin-bottom:24px;
}

.restart{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#9f68ff,#ff89e7);
color:#fff;
font-weight:700;
font-size:16px;
cursor:pointer;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}
</style>
</head>
<body>
<div id="game">
<div class="phone">
<div class="screen">

<div class="top">
<div class="day" id="dayText">DAY 1</div>
<div class="stat-box">
<div class="stat-chip">팬 ❤ <span id="fans">12</span></div>
<div class="stat-chip">자금 💎 <span id="money">400</span></div>
</div>
</div>

<div class="stage">
<div class="spotlight"></div>
<div class="character">
<div class="head">
<div class="hair"></div>
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>
<div class="body-char"></div>
</div>
</div>

<div class="dialogue-box">
<div id="speaker">차연우</div>
<div id="storyText">대표님이 마지막 경고를 했어. 이번 컴백 실패하면 우리 팀은 해체래.</div>
</div>

<div class="choices" id="choices"></div>

<div class="panel">
<div class="panel-title">멤버 상태</div>

<div class="member">
<span>차연우 ❤ <span id="yun">60</span></span>
<div class="bar"><div class="fill" id="yunBar" style="width:60%"></div></div>
</div>

<div class="member">
<span>이도현 ❤ <span id="dohyun">45</span></span>
<div class="bar"><div class="fill" id="dohyunBar" style="width:45%"></div></div>
</div>

<div class="member">
<span>권세빈 ❤ <span id="sebin">40</span></span>
<div class="bar"><div class="fill" id="sebinBar" style="width:40%"></div></div>
</div>

</div>
</div>

<div class="result" id="resultScreen">
<div class="result-card">
<h1 id="endingTitle">NORMAL END</h1>
<p id="endingText"></p>
<button class="restart" onclick="location.reload()">다시 플레이</button>
</div>
</div>

</div>
</div>

<script>
const state={
 day:1,
 fans:12,
 money:400,
 affection:{
  yun:60,
  dohyun:45,
  sebin:40
 }
}

const episodes=[
{
 speaker:'차연우',
 text:'대표님이 마지막 경고를 했어. 이번 컴백 실패하면 우리 팀은 해체래.',
 choices:[
  {text:'우리가 다시 올라가면 돼.', fans:+8, affection:{yun:+10}},
  {text:'현실적으로 무리야.', money:+200, affection:{yun:-10}},
  {text:'밤새 연습하자.', fans:+4, affection:{yun:+5,sebin:+5}}
 ]
},
{
 speaker:'이도현',
 text:'팬들이 우리를 아직 기억할까?',
 choices:[
  {text:'라이브 방송 켜자.', fans:+15, money:-100, affection:{dohyun:+8}},
  {text:'자극적인 컨셉으로 간다.', fans:+20, affection:{dohyun:-5,sebin:-5}},
  {text:'천천히 다시 시작하자.', affection:{dohyun:+10}}
 ]
},
{
 speaker:'권세빈',
 text:'신곡 안무가 너무 어려워… 나 때문에 망하면 어떡해?',
 choices:[
  {text:'끝까지 같이 간다.', affection:{sebin:+15,yun:+5}, fans:+10},
  {text:'이번 무대는 빠지는 게 어때?', money:+250, affection:{sebin:-20}},
  {text:'개인 연습 시간을 늘리자.', affection:{sebin:+5}, fans:+5}
 ]
},
{
 speaker:'매니저',
 text:'드디어 음악방송 1차 후보에 올랐습니다.',
 choices:[
  {text:'팬 이벤트를 연다.', fans:+25, money:-200},
  {text:'멤버들에게 보너스를 준다.', money:-150, affection:{yun:+5,dohyun:+5,sebin:+5}},
  {text:'전부 광고에 투자한다.', fans:+35, money:-350}
 ]
}
]

let currentEpisode=0;

const storyText=document.getElementById('storyText');
const speaker=document.getElementById('speaker');
const choicesEl=document.getElementById('choices');

function render(){
 const ep=episodes[currentEpisode];
 speaker.textContent=ep.speaker;
 storyText.textContent=ep.text;
 document.getElementById('dayText').textContent=`DAY ${state.day}`;
 document.getElementById('fans').textContent=state.fans;
 document.getElementById('money').textContent=state.money;
 
 updateBars();
 
 choicesEl.innerHTML='';
 ep.choices.forEach(choice=>{
  const btn=document.createElement('button');
  btn.className='choice';
  btn.textContent=choice.text;
  btn.onclick=()=>selectChoice(choice);
  choicesEl.appendChild(btn);
 })
}

function updateBars(){
 document.getElementById('yun').textContent=state.affection.yun;
 document.getElementById('dohyun').textContent=state.affection.dohyun;
 document.getElementById('sebin').textContent=state.affection.sebin;
 
 document.getElementById('yunBar').style.width=state.affection.yun+'%';
 document.getElementById('dohyunBar').style.width=state.affection.dohyun+'%';
 document.getElementById('sebinBar').style.width=state.affection.sebin+'%';
}

function selectChoice(choice){
 state.day++;
 
 if(choice.fans) state.fans+=choice.fans;
 if(choice.money) state.money+=choice.money;
 
 if(choice.affection){
  Object.keys(choice.affection).forEach(member=>{
   state.affection[member]+=choice.affection[member];
   if(state.affection[member]>100) state.affection[member]=100;
   if(state.affection[member]<0) state.affection[member]=0;
  })
 }
 
 currentEpisode++;
 
 if(currentEpisode>=episodes.length){
  ending();
 }else{
  render();
 }
}

function ending(){
 const totalAffection=state.affection.yun+state.affection.dohyun+state.affection.sebin;
 const result=document.getElementById('resultScreen');
 const title=document.getElementById('endingTitle');
 const text=document.getElementById('endingText');
 
 result.classList.add('show');
 
 if(state.fans>=70 && totalAffection>=210){
  title.innerHTML='SUPER<br>STAR END';
  text.textContent='루미너스는 기적적으로 역주행에 성공했다. 팬들은 다시 모였고, 멤버들도 끝까지 서로를 믿었다. 당신은 전설의 프로듀서가 되었다.';
 }else if(totalAffection<120){
  title.innerHTML='DISBAND<br>END';
  text.textContent='팀 내부 갈등은 끝내 터져버렸다. 마지막 무대 이후 루미너스는 해체되었고, 멤버들은 각자의 길로 흩어졌다.';
 }else{
  title.innerHTML='NORMAL<br>END';
  text.textContent='큰 성공은 아니었지만, 루미너스는 살아남았다. 아직 작은 무대뿐이지만 다시 시작할 희망은 남아있다.';
 }
}

render();
</script>
</body>
</html>
